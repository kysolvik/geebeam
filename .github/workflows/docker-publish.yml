name: Create and publish a Docker image

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  REPO_NAME: geebeam

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    # Sets up permissions
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to Dockerhub
        uses: docker/login-action@3999a1f4362c53e6a6048cde50f69868af81da5c
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@4f5b5234679dfa19837d4942067c97d7df43b7b3
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/${{ env.REPO_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,format=long

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@789f68658055d3ca993799b232b5c46dfe3f114d
        with:
          platforms: linux/amd64
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
